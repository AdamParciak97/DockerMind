<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐳 DockerMind</title>

<!-- All assets are served locally — baked into Docker image at build time -->
<script src="/static/tailwind.js"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<link  rel="stylesheet" href="/static/highlight-dark.min.css">
<script src="/static/chart.min.js"></script>
<script src="/static/highlight.min.js"></script>
<script src="/static/highlight-yaml.min.js"></script>
<link rel="stylesheet" href="/static/xterm.css">
<script src="/static/xterm.js"></script>
<script src="/static/xterm-fit.js"></script>
<script defer src="/static/alpine.min.js"></script>

<style>
  [x-cloak] { display: none !important; }
  html, body { height: 100%; background: #030712; }

  /* Thin scrollbars everywhere */
  ::-webkit-scrollbar       { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

  /* Log / analysis monospace */
  .mono { font-family: 'Courier New', Courier, monospace; font-size: 12px; line-height: 1.65; }

  /* Smooth progress bars */
  .bar { transition: width 0.7s ease; }

  /* Pulsing status dot */
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.25} }
  .pdot { animation: pdot 2s infinite; }

  /* Highlight filter match */
  mark.hi { background: #ca8a04; color: #000; border-radius: 2px; padding: 0 2px; }

  /* Rendered AI analysis */
  .analysis h3 { color:#67e8f9; font-size:1rem; font-weight:700;
    margin: 1.25rem 0 .5rem; padding-bottom:.25rem;
    border-bottom: 1px solid #1f2937; }
  .analysis code { background:#111827; color:#4ade80; padding:1px 4px;
    border-radius:3px; font-size:.8em; font-family:monospace; }
  .analysis pre  { background:#000; border:1px solid #374151; border-radius:.5rem;
    padding:.75rem; overflow-x:auto; margin:.5rem 0; position:relative; }
  .analysis pre code { background:none; color:#4ade80; font-size:.78em; padding:0; }
  .analysis strong { color:#f9fafb; font-weight:600; }
  .analysis li { margin-left:1rem; color:#d1d5db; }
  .copy-btn { position:absolute; top:.4rem; right:.4rem;
    background:#374151; border:none; color:#9ca3af; font-size:.7rem;
    padding:2px 7px; border-radius:4px; cursor:pointer; opacity:0; transition:opacity .2s; }
  .analysis pre:hover .copy-btn { opacity:1; }
</style>
</head>

<body class="dark bg-gray-950 text-gray-200 h-full" x-data="app()" x-cloak>

<!-- ═══════════════════════════════════════════════════════════════════════════
     LOGIN MODAL
     ═══════════════════════════════════════════════════════════════════════════ -->
<div x-show="!loggedIn"
     class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
    <div class="text-center mb-7">
      <div class="text-5xl mb-3">🐳</div>
      <h1 class="text-2xl font-bold text-white tracking-tight">DockerMind</h1>
      <p class="text-gray-500 text-sm mt-1">AI-powered Docker monitoring</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Użytkownik</label>
        <input type="text" x-model="lf.u" @keydown.enter="login()"
          autocomplete="off" spellcheck="false"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5
                 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Hasło</label>
        <input type="password" x-model="lf.p" @keydown.enter="login()"
          autocomplete="new-password"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5
                 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors">
      </div>
      <div x-show="lf.err"
           class="bg-red-950/60 border border-red-800 rounded-lg px-3 py-2 text-red-300 text-sm"
           x-text="lf.err"></div>
      <button @click="login()"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5
               rounded-lg transition-colors active:scale-95">
        Zaloguj się
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     INACTIVITY WARNING BANNER
     ═══════════════════════════════════════════════════════════════════════════ -->
<div x-show="_inactivityWarning"
     class="fixed top-0 left-0 right-0 z-50 bg-yellow-600 text-white text-center py-2 text-sm font-medium shadow-lg">
  Sesja wygaśnie za 2 minuty z powodu braku aktywności.
  <button @click="_resetInactivityTimer()"
          class="ml-3 underline font-semibold hover:text-yellow-100">
    Przedłuż sesję
  </button>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MAIN APP
     ═══════════════════════════════════════════════════════════════════════════ -->
<div x-show="loggedIn" class="flex h-screen overflow-hidden">

  <!-- ─── SIDEBAR ──────────────────────────────────────────────────────────── -->
  <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col flex-shrink-0">

    <!-- Logo -->
    <div class="px-4 py-4 border-b border-gray-800 flex-shrink-0">
      <div class="flex items-center gap-2.5">
        <span class="text-3xl leading-none">🐳</span>
        <div>
          <div class="font-bold text-white text-lg leading-tight">DockerMind</div>
          <div class="text-gray-600 text-xs">v1.0</div>
        </div>
      </div>
      <!-- WS indicator -->
      <div class="flex items-center gap-1.5 mt-2.5">
        <div :class="wsOk ? 'bg-green-400 pdot' : 'bg-red-500'"
             class="w-2 h-2 rounded-full flex-shrink-0"></div>
        <span class="text-xs text-gray-500"
              x-text="wsOk ? 'WebSocket aktywny' : 'Łączenie...'"></span>
      </div>
    </div>

    <!-- Server list -->
    <div class="flex-1 overflow-y-auto py-3 px-3">
      <div class="text-xs text-gray-600 uppercase tracking-widest mb-2 px-1">Serwery</div>

      <template x-if="servers.length === 0">
        <div class="text-center text-gray-700 text-sm py-6">
          Brak połączonych agentów
        </div>
      </template>

      <!-- Grouped servers -->
      <template x-for="grp in groupedServers.groups" :key="grp.id">
        <div class="mb-2">
          <!-- Group header -->
          <button @click="expandedGroups[grp.id] = !expandedGroups[grp.id]"
            class="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg
                   text-gray-400 hover:text-gray-200 hover:bg-gray-800/50 transition-colors text-xs">
            <span x-text="expandedGroups[grp.id] ? '▾' : '▸'" class="flex-shrink-0 w-3"></span>
            <span class="w-2 h-2 rounded-full flex-shrink-0"
                  :style="`background:${grp.color}`"></span>
            <span class="font-semibold uppercase tracking-wide flex-1 text-left truncate"
                  x-text="grp.name"></span>
            <span class="text-gray-600" x-text="grp.members.length"></span>
          </button>
          <!-- Group servers -->
          <div x-show="expandedGroups[grp.id]" class="pl-2 mt-0.5 space-y-1">
            <template x-for="srv in grp.members" :key="srv.agent_id">
              <div @click="selectSrv(srv.agent_id); page='dashboard'"
                :class="selSrvId===srv.agent_id ? 'bg-gray-800 border-gray-600' : 'border-transparent hover:bg-gray-800/50'"
                class="border rounded-xl p-2.5 cursor-pointer transition-all duration-150">
                <div class="flex items-center gap-2">
                  <div :class="srvDot(srv)" class="w-2 h-2 rounded-full flex-shrink-0"></div>
                  <div class="flex-1 min-w-0">
                    <div class="font-semibold text-white text-xs truncate"
                         x-text="srv.info?.agent_name || srv.agent_id"></div>
                    <div class="text-gray-600 text-xs truncate" x-text="srv.info?.ip || ''"></div>
                  </div>
                </div>
              </div>
            </template>
            <template x-if="grp.members.length === 0">
              <div class="text-gray-700 text-xs px-2 py-1">Brak serwerów</div>
            </template>
          </div>
        </div>
      </template>

      <!-- Ungrouped servers -->
      <template x-if="groupedServers.ungrouped.length > 0">
        <div class="mb-2">
          <template x-if="groupedServers.groups.length > 0">
            <div class="text-xs text-gray-700 uppercase tracking-wide px-2 py-1">Bez grupy</div>
          </template>
          <template x-for="srv in groupedServers.ungrouped" :key="srv.agent_id">
            <div @click="selectSrv(srv.agent_id); page='dashboard'"
              :class="selSrvId===srv.agent_id ? 'bg-gray-800 border-gray-600' : 'border-transparent hover:bg-gray-800/50'"
              class="border rounded-xl p-3 mb-1 cursor-pointer transition-all duration-150">
              <div class="flex items-center gap-2">
                <div :class="srvDot(srv)" class="w-2.5 h-2.5 rounded-full flex-shrink-0"></div>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold text-white text-sm truncate"
                       x-text="srv.info?.agent_name || srv.agent_id"></div>
                  <div class="text-gray-500 text-xs truncate" x-text="srv.info?.ip || ''"></div>
                </div>
              </div>
              <div class="flex justify-between mt-1.5 text-xs text-gray-500">
                <span x-text="`${(srv.containers||[]).length} kontenerów`"></span>
                <span x-text="ago(srv.last_seen)"></span>
              </div>
              <template x-if="srvWarn(srv)">
                <div class="text-yellow-500 text-xs mt-1">⚠ Restarty</div>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- Bottom nav -->
    <div class="px-3 pb-3 border-t border-gray-800 pt-2 space-y-0.5 flex-shrink-0">
      <button @click="page='allalerts'; selCt=null; loadAllAlerts()"
        :class="page==='allalerts' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:bg-gray-800/50'"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm transition-colors">
        <span>🔔</span>
        <span class="flex-1 text-left">Alerty</span>
        <span x-show="alertBadge > 0"
              class="bg-red-600 text-white text-xs px-1.5 py-0.5 rounded-full min-w-[20px] text-center"
              x-text="alertBadge"></span>
      </button>
      <button @click="page='secrets'; selSrvId=null; selCt=null; loadSecrets()"
        :class="page==='secrets' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:bg-gray-800/50'"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm transition-colors">
        🔐 <span>Sekrety</span>
      </button>
      <button @click="page='settings'; selCt=null; loadSettings()"
        :class="page==='settings' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:bg-gray-800/50'"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm transition-colors">
        ⚙ <span>Ustawienia</span>
      </button>
      <!-- User info -->
      <div class="flex items-center gap-2 px-3 py-2 text-xs text-gray-600 border-t border-gray-800 mt-1 pt-2">
        <span class="w-2 h-2 rounded-full bg-blue-500 flex-shrink-0"></span>
        <span class="flex-1 truncate" x-text="me"></span>
        <span x-show="myRole==='admin'" class="text-yellow-600 text-xs">admin</span>
        <button @click="logout()" class="text-gray-700 hover:text-red-400 transition-colors ml-1">⏻</button>
      </div>
    </div>

    <!-- User footer -->
    <div class="px-4 py-3 border-t border-gray-800 flex-shrink-0">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-xs text-gray-600">Zalogowany</div>
          <div class="text-sm text-gray-300" x-text="me"></div>
        </div>
        <button @click="logout()"
          class="text-xs text-gray-500 hover:text-red-400 transition-colors px-2 py-1 rounded">
          Wyloguj
        </button>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN PANEL ────────────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- TOP BAR -->
    <header class="bg-gray-900 border-b border-gray-800 px-5 py-2.5 flex-shrink-0">
      <div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-sm">

        <div class="flex items-center gap-1.5">
          <span class="text-gray-500">Serwery:</span>
          <span class="text-green-400 font-medium" x-text="`${gs.sOn} online`"></span>
          <span class="text-gray-700">/</span>
          <span class="text-red-400" x-text="`${gs.sOff} offline`"></span>
        </div>

        <div class="w-px h-4 bg-gray-800"></div>

        <div class="flex items-center gap-1.5">
          <span class="text-gray-500">Kontenery:</span>
          <span class="text-green-400" x-text="`${gs.cRun} uruch.`"></span>
          <span class="text-gray-700">/</span>
          <span class="text-red-400" x-text="`${gs.cStop} zat.`"></span>
          <template x-if="gs.cUnhealthy > 0">
            <span class="text-yellow-400 font-medium" x-text="`/ ${gs.cUnhealthy} ⚠`"></span>
          </template>
        </div>

        <div class="w-px h-4 bg-gray-800"></div>

        <div class="flex items-center gap-1.5">
          <span class="text-gray-500">AI:</span>
          <span class="text-purple-400">llama3</span>
          <span :class="wsOk ? 'text-green-500' : 'text-gray-600'"
                class="text-xs" x-text="wsOk ? '● połączony' : '○ offline'"></span>
        </div>

        <div class="ml-auto text-xs text-gray-600">
          Sync: <span x-text="lastSync ? lastSync.toLocaleTimeString('pl-PL') : '—'"></span>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="flex-1 overflow-auto p-5">

      <!-- ── ALL ALERTS PAGE ──────────────────────────────────────────── -->
      <template x-if="page==='allalerts'">
        <div class="max-w-4xl mx-auto">
          <div class="flex items-center justify-between mb-5">
            <h2 class="text-lg font-bold text-white flex items-center gap-2">
              🔔 Alerty
              <span x-show="alertBadge > 0"
                    class="bg-red-600 text-white text-xs px-2 py-0.5 rounded-full"
                    x-text="alertBadge + ' aktywnych'"></span>
            </h2>
            <div class="flex items-center gap-2">
              <select x-model="allAlertsFilter" @change="loadAllAlerts()"
                class="bg-gray-800 border border-gray-700 rounded-lg px-2 py-1.5
                       text-sm text-gray-200 focus:outline-none cursor-pointer">
                <option value="">Wszystkie</option>
                <option value="active">Aktywne</option>
                <option value="acknowledged">Potwierdzone</option>
              </select>
              <button @click="loadAllAlerts()"
                class="bg-gray-800 hover:bg-gray-700 text-gray-400 text-sm
                       px-3 py-1.5 rounded-lg transition-colors">🔄</button>
            </div>
          </div>

          <div x-show="allAlertsLoading" class="text-center py-12 text-gray-600">⏳</div>
          <div x-show="!allAlertsLoading">
            <template x-if="allAlerts.length === 0">
              <div class="text-center py-16 text-gray-700">
                <div class="text-4xl mb-3">✅</div>
                <div>Brak alertów.</div>
              </div>
            </template>
            <div class="space-y-2">
              <template x-for="ev in allAlerts" :key="ev.id">
                <div :class="ev.status==='active'
                       ? 'border-red-900/60 bg-red-950/20'
                       : 'border-gray-800 bg-gray-900/40'"
                     class="border rounded-xl px-4 py-3 flex items-center gap-4">
                  <span :class="ev.status==='active' ? 'bg-red-500 pdot' : 'bg-gray-600'"
                        class="w-2.5 h-2.5 rounded-full flex-shrink-0"></span>
                  <div class="flex-1 min-w-0 grid grid-cols-1 md:grid-cols-3 gap-1">
                    <div>
                      <div class="text-xs text-gray-500">Serwer / Kontener</div>
                      <div class="text-sm text-gray-200 truncate">
                        <span class="text-gray-500" x-text="ev.agent_id + ' / '"></span>
                        <span class="font-medium" x-text="ev.container_name"></span>
                      </div>
                    </div>
                    <div>
                      <div class="text-xs text-gray-500">Metryka</div>
                      <div class="text-sm text-yellow-400"
                           x-text="`${ev.metric_label}: ${ev.value.toFixed(1)} (próg: ${ev.threshold})`"></div>
                    </div>
                    <div>
                      <div class="text-xs text-gray-500">Czas</div>
                      <div class="text-xs text-gray-400" x-text="fmtDt(ev.triggered_at)"></div>
                      <div x-show="ev.ack_at"
                           class="text-xs text-gray-600"
                           x-text="ev.ack_at ? 'Potw.: ' + fmtDt(ev.ack_at) : ''"></div>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 flex-shrink-0">
                    <span :class="ev.status==='active'
                            ? 'bg-red-950/60 text-red-400 border-red-900'
                            : 'bg-gray-800 text-gray-500 border-gray-700'"
                          class="text-xs px-2 py-0.5 rounded border"
                          x-text="ev.status"></span>
                    <button x-show="ev.status==='active'" @click="ackAlertGlobal(ev)"
                      class="text-xs text-blue-500 hover:text-blue-400 bg-blue-950/40
                             border border-blue-900/50 px-2 py-1 rounded-lg transition-colors">
                      ✓ Potwierdź
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- ── SETTINGS PAGE ──────────────────────────────────────────────── -->
      <template x-if="page==='settings'">
        <div class="max-w-3xl mx-auto">
          <h2 class="text-lg font-bold text-white mb-5">⚙ Ustawienia</h2>

          <!-- Settings tab nav -->
          <div class="flex gap-1 mb-6 bg-gray-900 border border-gray-800 rounded-xl p-1 w-fit flex-wrap">
            <button @click="settingsTab='password'"
              :class="settingsTab==='password' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
              class="px-4 py-1.5 rounded-lg text-sm transition-all">🔑 Hasło</button>
            <button @click="settingsTab='users'; loadUsers()"
              :class="settingsTab==='users' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
              class="px-4 py-1.5 rounded-lg text-sm transition-all">👤 Użytkownicy</button>
            <button @click="settingsTab='srvgroups'"
              :class="settingsTab==='srvgroups' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
              class="px-4 py-1.5 rounded-lg text-sm transition-all">🖥 Grupy serwerów</button>
            <button @click="settingsTab='usrgroups'; loadUserGroups(); loadServerGroups()"
              :class="settingsTab==='usrgroups' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
              class="px-4 py-1.5 rounded-lg text-sm transition-all">👥 Grupy użytkowników</button>
            <button @click="settingsTab='ldap'; loadLdapConfig()"
              :class="settingsTab==='ldap' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
              class="px-4 py-1.5 rounded-lg text-sm transition-all">🔐 LDAP</button>
            <button @click="settingsTab='sessions'; loadSessions()"
              :class="settingsTab==='sessions' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
              class="px-4 py-1.5 rounded-lg text-sm transition-all">🖥 Sesje</button>
            <template x-if="myRole === 'admin'">
              <button @click="settingsTab='auditlog'; loadAuditLogs()"
                :class="settingsTab==='auditlog' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
                class="px-4 py-1.5 rounded-lg text-sm transition-all">📋 Audit log</button>
            </template>
            <template x-if="myRole === 'admin'">
              <button @click="settingsTab='system'; loadAgentTokenInfo()"
                :class="settingsTab==='system' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
                class="px-4 py-1.5 rounded-lg text-sm transition-all">⚙ System</button>
            </template>
          </div>

          <!-- ── Hasło ── -->
          <div x-show="settingsTab==='password'">
            <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 max-w-md">
              <div class="text-sm font-semibold text-gray-300 mb-4">Zmień hasło</div>
              <div class="space-y-3">
                <input x-model="pwForm.current" type="password" placeholder="Aktualne hasło"
                  class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2
                         text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500">
                <input x-model="pwForm.new1" type="password" placeholder="Nowe hasło"
                  class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2
                         text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500">
                <input x-model="pwForm.new2" type="password" placeholder="Powtórz nowe hasło"
                  class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2
                         text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500">
                <div x-show="pwForm.err"
                     :class="pwForm.err.includes('.env') ? 'text-yellow-400' : 'text-red-400'"
                     class="text-sm" x-text="pwForm.err"></div>
                <div x-show="pwForm.ok" class="text-green-400 text-sm" x-text="pwForm.ok"></div>
                <button @click="changePassword()"
                  class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold
                         px-5 py-2 rounded-lg transition-colors">
                  Zmień hasło
                </button>
              </div>
            </div>
          </div>

          <!-- ── Użytkownicy ── -->
          <div x-show="settingsTab==='users'">
            <template x-if="myRole !== 'admin'">
              <div class="text-gray-500 text-sm py-6">Tylko administrator może zarządzać użytkownikami.</div>
            </template>
            <template x-if="myRole === 'admin'">
              <div>
                <!-- Add user form -->
                <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 mb-5">
                  <div class="flex items-center justify-between mb-3">
                    <div class="text-sm font-semibold text-gray-400">Dodaj użytkownika</div>
                    <!-- Source toggle -->
                    <div class="flex rounded-lg overflow-hidden border border-gray-700 text-xs">
                      <button @click="newUserForm.source='db'"
                        :class="newUserForm.source==='db' ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-400 hover:text-gray-200'"

<!-- ═══════════════════════════════════════════════════════════════════════════
     APPLICATION LOGIC
     ═══════════════════════════════════════════════════════════════════════════ -->
<script>
function app() {
  return {

    /* ── Auth ──────────────────────────────────────────────────────────── */
    loggedIn: false,
    lf: { u: '', p: '', err: '' },
    me: '',
    myRole: 'user',

    /* ── Inactive session timeout ──────────────────────────────────────── */
    _inactivityTimer: null,
    _inactivityWarnTimer: null,
    _inactivityWarning: false,
    _INACTIVITY_WARN:   13 * 60 * 1000,   // 13 min → show warning
    _INACTIVITY_LOGOUT: 15 * 60 * 1000,   // 15 min → auto-logout

    /* ── WebSocket ─────────────────────────────────────────────────────── */
    ws: null,
    wsOk: false,
    lastSync: null,

    /* ── Servers ───────────────────────────────────────────────────────── */
    servers: [],
    selSrvId: null,

    /* ── Container detail ──────────────────────────────────────────────── */
    selCt: null,
    curTab: 'logs',
    tabs: [
      { id: 'overview',  lbl: '📊 Przegląd' },
      { id: 'logs',      lbl: '📋 Logi' },
      { id: 'compose',   lbl: '📄 Compose' },
      { id: 'analysis',  lbl: '🔍 Analiza AI' },
      { id: 'history',   lbl: '📈 Historia' },
      { id: 'alerts',    lbl: '🔔 Alerty' },
      { id: 'terminal',  lbl: '💻 Terminal' },
    ],

    /* ── Terminal ──────────────────────────────────────────────────────────── */
    _term: null,       // xterm Terminal instance
    _termFit: null,    // FitAddon instance
    _termWs: null,     // WebSocket to /ws/terminal
    termReady: false,

    /* ── Comparison charts ─────────────────────────────────────────────────── */
    cmpHours: 3,
    cmpLoading: false,
    cmpData: [],
    _cmpCharts: {},

    /* ── Logs ──────────────────────────────────────────────────────────── */
    logs: '',
    logLoading: false,
    logLines: 200,
    logFilter: '',
    logPaused: false,
    logTs: true,

    /* ── Compose ───────────────────────────────────────────────────────── */
    compose: '',
    cmpLoading: false,
    cmpEditing: false,
    cmpEditContent: '',
    cmpSaving: false,

    /* ── AI analysis ───────────────────────────────────────────────────── */
    aiRunning: false,
    aiContent: '',
    aiRisk: 'NIEZNANY',
    currentAnalysisId: null,
    savedAnalyses: [],

    /* ── Container actions ─────────────────────────────────────────────── */
    ctActionLoading: null,

    /* ── Email modal ───────────────────────────────────────────────────── */
    emailModal: false,
    emailAnalysisId: null,
    emailTo: '',
    emailSending: false,
    emailDone: '',
    emailErr: '',

    /* ── Notification toast ────────────────────────────────────────────── */
    notif: null,

    /* ── Page ──────────────────────────────────────────────────────────── */
    page: 'dashboard',    // 'dashboard' | 'secrets' | 'allalerts' | 'settings'

    /* ── Server groups ─────────────────────────────────────────────────── */
    serverGroups: [],
    expandedGroups: {},   // group_id → bool

    /* ── All-alerts page ───────────────────────────────────────────────── */
    allAlerts: [],
    allAlertsLoading: false,
    allAlertsFilter: '',   // '' | 'active' | 'acknowledged'

    /* ── Settings page ─────────────────────────────────────────────────── */
    settingsTab: 'password',
    auditLogs: [],
    sessions: [],
    sessionsLoading: false,
    agentTokenInfo: null,
    agentTokenNew: '',
    agentTokenLoading: false,
    agentTokenCopied: false,
    pwForm: { current: '', new1: '', new2: '', err: '', ok: '' },
    users: [],
    usersLoading: false,
    newUserForm: { username: '', password: '', role: 'user', source: 'db', err: '' },
    userGroups: [],
    newSrvGroupForm: { name: '', color: '#3b82f6', err: '' },
    newUsrGroupForm: { name: '', err: '' },
    editGroupMembers: null,   // { type:'srv'|'usr', group: {...}, draft: [...] }
    ldapForm: {
      enabled: false, server: '', port: 389,
      use_ssl: false, use_tls: false, tls_verify: true,
      bind_dn: '', bind_password: '', base_dn: '',
      user_filter: '(sAMAccountName={username})', admin_group_dn: '',
      loading: false, saving: false, err: '', ok: '',
      testUsername: '', testLoading: false, testResult: '', testOk: false,
    },

    /* ── Server alerts ────────────────────────────────────────────── */
    srvAlerts: [],
    srvAlertsLoading: false,

    /* ── Alerty ────────────────────────────────────────────────────────── */
    alertRules: [],
    alertEvents: [],
    alertsLoading: false,
    alertForm: { metric: 'cpu_percent', threshold: 80, min_duration: 0 },
    alertBadge: 0,

    /* ── Sekrety ───────────────────────────────────────────────────────── */
    secrets: [],
    secretsLoading: false,
    secretForm: { name: '', value: '', description: '' },
    secretReveal: { id: null, value: '' },

    /* ── Bulk actions ──────────────────────────────────────────────────── */
    bulkMode: false,
    bulkSelected: {},     // "agentId/containerName" → true
    bulkLoading: false,

    /* ── Metric history ────────────────────────────────────────────────── */
    histMetrics: null,
    histHours: 24,

    /* ── History ───────────────────────────────────────────────────────── */
    histData: null,
    histLoading: false,
    _charts: {},
    _srvCharts: {},

    /* ══════════════════════════════════════════════════════════════════════
       INIT
       ══════════════════════════════════════════════════════════════════════ */
    async init() {
      // Check if a valid session cookie exists
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (r.ok) {
          const d = await r.json();
          this.me     = d.username;
          this.myRole = d.role || 'user';
          this.loggedIn = true;
          this._startInactivityWatch();
          this.connectWS();
          this.loadAlertBadge();
          this.loadServerGroups();
        }
      } catch {}
    },

    /* ══════════════════════════════════════════════════════════════════════
       AUTH
       ══════════════════════════════════════════════════════════════════════ */
    async login() {
      this.lf.err = '';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: this.lf.u, password: this.lf.p }),
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          this.lf.err = e.detail || 'Nieprawidłowe dane logowania.';
          return;
        }
        const d = await r.json();
        this.me     = d.username;
        this.myRole = d.role || 'user';
        this.loggedIn = true;
        this.lf.u = '';
        this.lf.p = '';
        this._startInactivityWatch();
        this.connectWS();
        this.loadAlertBadge();
        this.loadServerGroups();
      } catch {
        this.lf.err = 'Błąd połączenia z serwerem.';
      }
    },

    async logout() {
      this._clearInactivityTimer();
      try {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      } catch {}
      this.loggedIn = false;
      this.servers  = [];
      this.selSrvId = null;
      this.selCt    = null;
      if (this.ws) { this.ws.close(); this.ws = null; }
      this.lf.u   = '';
      this.lf.p   = '';
      this.lf.err = '';
    },

    /* ══════════════════════════════════════════════════════════════════════
       INACTIVE SESSION TIMEOUT
       ══════════════════════════════════════════════════════════════════════ */
    _startInactivityWatch() {
      const events = ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'];
      events.forEach(ev => window.addEventListener(ev, () => this._resetInactivityTimer(), { passive: true }));
      this._resetInactivityTimer();
    },

    _resetInactivityTimer() {
      this._inactivityWarning = false;
      clearTimeout(this._inactivityWarnTimer);
      clearTimeout(this._inactivityTimer);
      this._inactivityWarnTimer = setTimeout(() => {
        this._inactivityWarning = true;
      }, this._INACTIVITY_WARN);
      this._inactivityTimer = setTimeout(() => {
        this.logout();
      }, this._INACTIVITY_LOGOUT);
    },

    _clearInactivityTimer() {
      this._inactivityWarning = false;
      clearTimeout(this._inactivityWarnTimer);
      clearTimeout(this._inactivityTimer);
    },

    /* ══════════════════════════════════════════════════════════════════════
       WEBSOCKET
       ══════════════════════════════════════════════════════════════════════ */
    connectWS() {
      if (this.ws && this.ws.readyState < 2) this.ws.close();
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      try {
        this.ws = new WebSocket(`${proto}//${location.host}/ws/dashboard`);
      } catch { return; }

      this.ws.onopen    = () => { this.wsOk = true; };
      this.ws.onclose   = () => {
        this.wsOk = false;
        if (this.loggedIn) setTimeout(() => this.connectWS(), 3000);
      };
      this.ws.onerror   = () => {};
      this.ws.onmessage = (e) => {
        try { this._onWS(JSON.parse(e.data)); } catch {}
      };
    },

    _onWS(msg) {
      const { event, data } = msg;

      if (event === 'init') {
        for (const a of data.agents || []) this._upSrv(a);
        this.lastSync = new Date();
      }
      else if (event === 'agent_online') {
        this._upSrv({ agent_id: data.agent_id, online: true, info: data.info });
      }
      else if (event === 'agent_offline') {
        const s = this._srv(data.agent_id);
        if (s) s.online = false;
      }
      else if (event === 'agent_data') {
        const s = this._srv(data.agent_id);
        if (s) {
          s.containers = data.containers || [];
          s.last_seen  = data.timestamp;
          s.online     = true;
        } else {
          this._upSrv({
            agent_id:   data.agent_id,
            online:     true,
            containers: data.containers || [],
            last_seen:  data.timestamp,
          });
        }
        // Update live metrics on selected container
        if (this.selCt && this.selSrvId === data.agent_id) {
          const fresh = (data.containers || []).find(c => c.name === this.selCt.name);
          if (fresh) Object.assign(this.selCt, fresh);
        }
        this.lastSync = new Date();
        // Refresh server charts if this agent is selected and no container is open
        if (this.selSrvId === data.agent_id && !this.selCt) {
          this.$nextTick(() => this.renderServerCharts());
        }
      }
      else if (event === 'analysis_start') {
        if (this._isCur(data)) {
          this.aiRunning = true;
          this.aiContent = '';
          this.aiRisk    = 'NIEZNANY';
          this.currentAnalysisId = null;
        }
      }
      else if (event === 'analysis_token') {
        if (this._isCur(data)) {
          this.aiContent += data.token;
          this.aiRisk = this._parseRisk(this.aiContent);
          this.$nextTick(() => {
            const el = document.getElementById('analysis-stream');
            if (el) el.scrollTop = el.scrollHeight;
          });
        }
      }
      else if (event === 'analysis_done') {
        if (this._isCur(data)) {
          this.aiRunning = false;
          this.currentAnalysisId = data.analysis_id || null;
          this.loadAnalyses();
        }
      }
      else if (event === 'analysis_error') {
        if (this._isCur(data)) {
          this.aiRunning = false;
          this.aiContent += `\n\n❌ Błąd analizy: ${data.error}`;
        }
      }
      else if (event === 'alert_triggered') {
        this.alertBadge++;
        if (this.selSrvId === data.agent_id && !this.selCt) this.loadServerAlerts();
        this._notify(
          `⚠ Alert: ${data.container_name} — ${data.metric} = ${data.value.toFixed(1)} (próg: ${data.threshold})`,
          'error'
        );
        if (this.selCt?.name === data.container_name && this.selSrvId === data.agent_id) {
          this.loadAlerts();
        }
      }
    },

    _upSrv(d) {
      const i = this.servers.findIndex(s => s.agent_id === d.agent_id);
      if (i >= 0) Object.assign(this.servers[i], d);
      else        this.servers.push({ containers: [], online: false, ...d });
    },
    _srv(id)    { return this.servers.find(s => s.agent_id === id); },
    _isCur(d)   { return this.selCt?.name === d.container_name && this.selSrvId === d.agent_id; },

    _parseRisk(txt) {
      const m = txt.match(/Ocena ryzyka[^:]*:\s*\[?(NISKI|ŚREDNI|WYSOKI|KRYTYCZNY)\]?/i);
      if (m) return m[1].toUpperCase();
      for (const l of ['KRYTYCZNY','WYSOKI','ŚREDNI','NISKI'])
        if (txt.toUpperCase().includes(l)) return l;
      return 'NIEZNANY';
    },

    /* ══════════════════════════════════════════════════════════════════════
       COMPUTED
       ══════════════════════════════════════════════════════════════════════ */
    get gs() {
      let sOn=0, sOff=0, cRun=0, cStop=0, cUnhealthy=0;
      for (const s of this.servers) {
        s.online ? sOn++ : sOff++;
        for (const c of s.containers || []) {
          if (c.status === 'running') cRun++;
          else if (['exited','dead'].includes(c.status)) cStop++;
          if ((c.restart_count||0) > 3) cUnhealthy++;
        }
      }
      return { sOn, sOff, cRun, cStop, cUnhealthy };
    },

    get sortedServers() {
      return [...this.servers].sort((a,b) => {
        if (a.online && !b.online) return -1;
        if (!a.online && b.online) return 1;
        return (a.info?.agent_name||'').localeCompare(b.info?.agent_name||'');
      });
    },

    get selSrv() { return this._srv(this.selSrvId); },

    get filteredLogs() {
      if (!this.logs) return '';
      if (!this.logFilter) return this.logs;
      const f = this.logFilter.toLowerCase();
      return this.logs.split('\n').filter(l => l.toLowerCase().includes(f)).join('\n');
    },

    /* ══════════════════════════════════════════════════════════════════════
       NAVIGATION
       ══════════════════════════════════════════════════════════════════════ */
    selectSrv(id) {
      this.selSrvId  = id;
      this.selCt     = null;
      this.srvAlerts = [];
      this.dCharts();
      this.$nextTick(() => this.renderServerCharts());
      this.loadServerAlerts();
    },

    backToServer() {
      this.closeTerminal();
      this.selCt = null;
      this.dCharts();
      this.$nextTick(() => this.renderServerCharts());
    },

    openCt(ct, tab = 'overview') {
      this.selCt      = { ...ct };
      this.curTab     = tab;
      this.logs       = '';
      this.compose    = '';
      this.cmpEditing = false;
      this.cmpEditContent = '';
      this.aiContent  = '';
      this.aiRisk     = 'NIEZNANY';
      this.aiRunning  = false;
      this.currentAnalysisId = null;
      this.savedAnalyses = [];
      this.histData   = null;
      this.dCharts();
      this.dSrvCharts();

      if (tab === 'overview')  this.loadCompose();
      if (tab === 'logs')      this.loadLogs();
      if (tab === 'compose')   this.loadCompose();
      if (tab === 'analysis')  this.loadAnalyses();
      if (tab === 'history')   this.loadHistory();
      if (tab === 'alerts')    this.loadAlerts();
    },

    switchTab(tab) {
      if (this.curTab === 'terminal' && tab !== 'terminal') this.closeTerminal();
      this.curTab = tab;
      this.dCharts();
      if (tab === 'overview'  && !this.compose)         this.loadCompose();
      if (tab === 'logs'      && !this.logs)            this.loadLogs();
      if (tab === 'compose'   && !this.compose)         this.loadCompose();
      if (tab === 'analysis')                           this.loadAnalyses();
      if (tab === 'history')                            this.loadHistory();
      if (tab === 'alerts')                             this.loadAlerts();
      if (tab === 'terminal')                           this.$nextTick(() => this.openTerminal());
    },

    /* ══════════════════════════════════════════════════════════════════════
       API HELPERS
       ══════════════════════════════════════════════════════════════════════ */
    /* ── CSRF double-submit helper ─────────────────────────────────────────── */
    _csrf() {
      const c = document.cookie.split(';').map(s => s.trim())
        .find(s => s.startsWith('csrf_token='));
      return c ? decodeURIComponent(c.slice('csrf_token='.length)) : '';
    },

    async _get(url) {
      const r = await fetch(url, { credentials: 'include' });
      if (r.status === 401) { this.logout(); return null; }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    },

    async _post(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': this._csrf() },
        body: JSON.stringify(body),
      });
      if (r.status === 401) { this.logout(); return null; }
      if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${r.status}`); }
      return r.json();
    },

    async _del(url) {
      const r = await fetch(url, {
        method: 'DELETE',
        credentials: 'include',
        headers: { 'X-CSRF-Token': this._csrf() },
      });
      if (r.status === 401) { this.logout(); return null; }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json().catch(() => ({}));
    },

    async _put(url, body) {
      const r = await fetch(url, {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': this._csrf() },
        body: JSON.stringify(body),
      });
      if (r.status === 401) { this.logout(); return null; }
      if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${r.status}`); }
      return r.json();
    },

    /* ══════════════════════════════════════════════════════════════════════
       DATA LOADING
       ══════════════════════════════════════════════════════════════════════ */
    async loadLogs() {
      if (!this.selCt) return;
      this.logLoading = true;
      this.logs = '';
      try {
        const d = await this._get(
          `/api/servers/${this.selSrvId}/containers/${encodeURIComponent(this.selCt.name)}/logs?lines=${this.logLines}`
        );
        if (d) {
          this.logs = d.logs || '';
          this.$nextTick(() => {
            const el = document.getElementById('log-viewer');
            if (el) el.scrollTop = el.scrollHeight;
          });
        }
      } catch(e) {
        this.logs = `Błąd: ${e.message}`;
      } finally {
        this.logLoading = false;
      }
    },

    async loadCompose() {
      if (!this.selCt) return;
      this.cmpLoading = true;
      try {
        const d = await this._get(
          `/api/servers/${this.selSrvId}/containers/${encodeURIComponent(this.selCt.name)}/compose`
        );
        if (d) {
          this.compose = d.compose || '';
          this.$nextTick(() => {
            const el = document.querySelector('#compose-pre code');
            if (el && !el.dataset.highlighted) hljs.highlightElement(el);
          });
        }
      } catch(e) {
        this.compose = `Błąd: ${e.message}`;
      } finally {
        this.cmpLoading = false;
      }
    },

    async runAnalysis() {
      if (!this.selCt || this.aiRunning) return;
      this.aiRunning = true;
      this.aiContent = '⏳ Wysyłanie żądania analizy...\n';
      this.aiRisk    = 'NIEZNANY';
      try {
        await this._post('/api/analyze', {
          agent_id:       this.selSrvId,
          container_name: this.selCt.name,
        });
        this.aiContent = '⏳ Analiza AI uruchomiona. Tokeny pojawią się za chwilę...\n\n';
      } catch(e) {
        this.aiRunning = false;
        this.aiContent = `❌ Błąd uruchomienia analizy: ${e.message}`;
      }
    },

    async loadAnalyses() {
      if (!this.selCt) return;
      try {
        const d = await this._get(
          `/api/analyses?agent_id=${this.selSrvId}&container_name=${encodeURIComponent(this.selCt.name)}`
        );
        if (d) this.savedAnalyses = d.map(a => ({ ...a, _open: false, full_content: null }));
      } catch {}
    },

    async loadFull(a) {
      try {
        const d = await this._get(`/api/analyses/${a.id}`);
        if (d) a.full_content = d.content;
      } catch {}
    },

    async delAnalysis(id) {
      if (!confirm('Usunąć tę analizę?')) return;
      try {
        await this._del(`/api/analyses/${id}`);
        this.savedAnalyses = this.savedAnalyses.filter(a => a.id !== id);
      } catch(e) { alert(`Błąd: ${e.message}`); }
    },

    async loadHistory() {
      if (!this.selCt) return;
      this.histLoading = true;
      try {
        const [evtData, tsData] = await Promise.all([
          this._get(
            `/api/servers/${this.selSrvId}/containers/${encodeURIComponent(this.selCt.name)}/history?days=7`
          ).catch(() => null),
          this._get(
            `/api/metrics/${encodeURIComponent(this.selSrvId)}/${encodeURIComponent(this.selCt.name)}?hours=${this.histHours}`
          ).catch(() => null),
        ]);
        if (evtData) this.histData = evtData;
        if (tsData)  this.histMetrics = tsData;
        this.$nextTick(() => this.renderCharts());
      } catch {}
      finally { this.histLoading = false; }
    },

    /* ══════════════════════════════════════════════════════════════════════
       CHARTS
       ══════════════════════════════════════════════════════════════════════ */
    renderCharts() {
      this.dCharts();

      const baseOpts = (yLabel = '') => ({
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { labels: { color: '#6b7280', boxWidth: 10, font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#4b5563', maxTicksLimit: 6, maxRotation: 0 }, grid: { color: '#111827' } },
          y: { ticks: { color: '#4b5563' }, grid: { color: '#111827' }, beginAtZero: true, title: yLabel ? { display: true, text: yLabel, color: '#4b5563', font: { size: 10 } } : {} },
        },
      });

      // ── Time-series charts (from /api/metrics) ────────────────────────
      const pts = this.histMetrics?.points || [];
      if (pts.length) {
        const tsLbls = pts.map(p => p.t.substring(0,16).replace('T',' '));

        const tsCpu = document.getElementById('chart-ts-cpu');
        if (tsCpu) this._charts.tsCpu = new Chart(tsCpu, {
          type: 'line',
          data: { labels: tsLbls, datasets: [{
            label: 'CPU %', data: pts.map(p => p.cpu),
            borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,.08)',
            fill: true, tension: 0.3, pointRadius: 0,
          }]},
          options: baseOpts('%'),
        });

        const tsRam = document.getElementById('chart-ts-ram');
        if (tsRam) this._charts.tsRam = new Chart(tsRam, {
          type: 'line',
          data: { labels: tsLbls, datasets: [{
            label: 'RAM %', data: pts.map(p => p.mem),
            borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,.08)',
            fill: true, tension: 0.3, pointRadius: 0,
          }]},
          options: baseOpts('%'),
        });

        const toMB = v => v ? +(v / 1048576).toFixed(3) : 0;
        const tsNet = document.getElementById('chart-ts-net');
        if (tsNet) this._charts.tsNet = new Chart(tsNet, {
          type: 'line',
          data: { labels: tsLbls, datasets: [
            { label: 'RX MB', data: pts.map(p => toMB(p.rx)), borderColor: '#06b6d4', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0 },
            { label: 'TX MB', data: pts.map(p => toMB(p.tx)), borderColor: '#10b981', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0 },
          ]},
          options: baseOpts('MB'),
        });

        const tsBlk = document.getElementById('chart-ts-blk');
        if (tsBlk) this._charts.tsBlk = new Chart(tsBlk, {
          type: 'line',
          data: { labels: tsLbls, datasets: [
            { label: 'Odczyt MB', data: pts.map(p => toMB(p.blk_r)), borderColor: '#f59e0b', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0 },
            { label: 'Zapis MB',  data: pts.map(p => toMB(p.blk_w)), borderColor: '#ef4444', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0 },
          ]},
          options: baseOpts('MB'),
        });
      }

      // ── Event-based charts (from /api/history) ────────────────────────
      const evts = this.histData?.events || [];
      if (!evts.length) return;

      // Restarts per day
      const byDay = {};
      for (const e of evts) {
        const d = e.occurred_at.substring(0, 10);
        byDay[d] = (byDay[d] || 0) + (e.event_type === 'restart' ? 1 : 0);
      }
      const rc = document.getElementById('chart-restarts');
      if (rc) this._charts.r = new Chart(rc, {
        type: 'bar',
        data: { labels: Object.keys(byDay), datasets: [{
          label: 'Restarty',
          data: Object.values(byDay),
          backgroundColor: '#ef4444', borderRadius: 4,
        }]},
        options: baseOpts(),
      });

      const xLbls = evts.map(e => e.occurred_at.substring(0,16).replace('T',' '));

      const cc = document.getElementById('chart-cpu');
      if (cc) this._charts.c = new Chart(cc, {
        type: 'line',
        data: { labels: xLbls, datasets: [{
          label: 'CPU %', data: evts.map(e => e.cpu_percent),
          borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,.1)',
          fill: true, tension: 0.4, pointRadius: 2,
        }]},
        options: baseOpts('%'),
      });

      const rmc = document.getElementById('chart-ram');
      if (rmc) this._charts.m = new Chart(rmc, {
        type: 'line',
        data: { labels: xLbls, datasets: [{
          label: 'RAM %', data: evts.map(e => e.mem_percent),
          borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,.1)',
          fill: true, tension: 0.4, pointRadius: 2,
        }]},
        options: baseOpts('%'),
      });
    },

    dCharts() {
      for (const c of Object.values(this._charts)) c.destroy();
      this._charts = {};
    },

    dSrvCharts() {
      for (const c of Object.values(this._srvCharts)) c.destroy();
      this._srvCharts = {};
    },

    renderServerCharts() {
      this.dSrvCharts();
      const all = this.selSrv?.containers || [];
      const running = all.filter(c => c.status === 'running');
      if (!running.length) return;

      const labels = running.map(c => c.name);

      const baseOpts = (unit = '%') => ({
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { display: false },
                   tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x.toFixed(1)} ${unit}` } } },
        scales: {
          x: { beginAtZero: true,
               ticks: { color: '#4b5563', callback: v => `${v}${unit}` },
               grid: { color: '#111827' } },
          y: { ticks: { color: '#9ca3af', font: { size: 11 } }, grid: { color: '#111827' } },
        },
      });

      const mkChart = (id, data, colors, unit = '%') => {
        const el = document.getElementById(id);
        if (!el) return;
        this._srvCharts[id] = new Chart(el, {
          type: 'bar',
          data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 3 }] },
          options: baseOpts(unit),
        });
      };

      mkChart('chart-srv-cpu',
        running.map(c => c.cpu_percent || 0),
        running.map(c => (c.cpu_percent||0) > 80 ? '#ef4444' : (c.cpu_percent||0) > 50 ? '#f59e0b' : '#3b82f6'));

      mkChart('chart-srv-ram',
        running.map(c => c.memory?.percent || 0),
        running.map(c => (c.memory?.percent||0) > 85 ? '#ef4444' : (c.memory?.percent||0) > 65 ? '#f59e0b' : '#8b5cf6'));

      const toMB = v => v ? +(v / 1048576).toFixed(2) : 0;
      mkChart('chart-srv-rx',
        running.map(c => toMB(c.network?.rx_bytes)),
        running.map(() => '#06b6d4'), 'MB');

      mkChart('chart-srv-tx',
        running.map(c => toMB(c.network?.tx_bytes)),
        running.map(() => '#10b981'), 'MB');
    },

    /* ══════════════════════════════════════════════════════════════════════
       STYLING HELPERS
       ══════════════════════════════════════════════════════════════════════ */
    srvDot(s) {
      if (!s.online)       return 'bg-red-500';
      if (this.srvWarn(s)) return 'bg-yellow-400';
      return 'bg-green-400';
    },
    srvWarn(s)  { return (s.containers||[]).some(c => (c.restart_count||0) > 3); },

    stBadge(st) {
      if (st === 'running')    return 'bg-green-950/60 text-green-400 border-green-900';
      if (st === 'restarting') return 'bg-yellow-950/60 text-yellow-400 border-yellow-900';
      if (st === 'paused')     return 'bg-blue-950/60 text-blue-400 border-blue-900';
      return 'bg-red-950/60 text-red-400 border-red-900';
    },

    riskBadge(r) {
      const m = {
        NISKI:     'bg-green-800 text-green-100',
        ŚREDNI:    'bg-yellow-700 text-yellow-100',
        WYSOKI:    'bg-orange-700 text-orange-100',
        KRYTYCZNY: 'bg-red-700 text-red-100',
      };
      return m[r] || 'bg-gray-700 text-gray-300';
    },

    cpuClr(p) {
      if (p > 80) return 'bg-red-500';
      if (p > 50) return 'bg-yellow-500';
      return 'bg-blue-500';
    },
    ramClr(p) {
      if (p > 85) return 'bg-red-500';
      if (p > 65) return 'bg-yellow-500';
      return 'bg-purple-500';
    },

    evDot(t) {
      return { crash:'bg-red-500', restart:'bg-yellow-500',
               stop:'bg-gray-500', start:'bg-green-500' }[t] || 'bg-gray-600';
    },
    evBadge(t) {
      return { crash:'bg-red-950/60 text-red-400 border-red-900',
               restart:'bg-yellow-950/60 text-yellow-400 border-yellow-900',
               stop:'bg-gray-800 text-gray-400 border-gray-700',
               start:'bg-green-950/60 text-green-400 border-green-900' }[t]
          || 'bg-gray-800 text-gray-400 border-gray-700';
    },

    /* ══════════════════════════════════════════════════════════════════════
       FORMATTERS
       ══════════════════════════════════════════════════════════════════════ */
    ago(ts) {
      if (!ts) return '—';
      const d = Math.floor(Date.now()/1000 - ts);
      if (d < 10)   return 'teraz';
      if (d < 60)   return `${d}s temu`;
      if (d < 3600) return `${Math.floor(d/60)}m temu`;
      return `${Math.floor(d/3600)}h temu`;
    },

    fmtRam(m) {
      if (!m) return '—';
      return `${this.fmtB(m.usage_bytes)} / ${this.fmtB(m.limit_bytes)} (${m.percent||0}%)`;
    },

    fmtB(n) {
      if (!n) return '0 B';
      const u = ['B','KB','MB','GB'];
      let i = 0;
      while (n >= 1024 && i < u.length-1) { n /= 1024; i++; }
      return `${n.toFixed(1)} ${u[i]}`;
    },

    fmtDt(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString('pl-PL', { dateStyle:'short', timeStyle:'short' });
    },

    /* ══════════════════════════════════════════════════════════════════════
       CONTENT RENDERERS
       ══════════════════════════════════════════════════════════════════════ */
    renderLogs() {
      const txt = this.filteredLogs;
      if (!txt) return '<span class="text-gray-700">Brak logów.</span>';

      let lines = txt.split('\n');

      // Strip timestamp prefix if user toggled timestamps off
      if (!this.logTs) {
        lines = lines.map(l => l.replace(/^\d{4}-\d{2}-\d{2}T[\d:.Z+\-]+ /, ''));
      }

      const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      if (!this.logFilter) return esc(lines.join('\n'));

      const f = this.logFilter.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const re = new RegExp(`(${f})`, 'gi');
      return lines.map(l => esc(l).replace(re, '<mark class="hi">$1</mark>')).join('\n');
    },

    renderAnalysis(txt) {
      if (!txt) return '';

      // Escape HTML first
      let h = txt
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');

      // Code blocks — data-atrybut zamiast onclick z JSON (zapobiega XSS)
      h = h.replace(/```[a-z]*\n?([\s\S]*?)```/g, (_, code) => {
        const raw = code.trim()
          .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
        const safe = raw
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const dataAttr = safe.replace(/"/g,'&quot;');
        return `<pre><code>${safe}</code><button class="copy-btn" data-copy="${dataAttr}" onclick="navigator.clipboard.writeText(this.dataset.copy)">📋 Kopiuj</button></pre>`;
      });

      // Inline code
      h = h.replace(/`([^`\n]+)`/g,'<code>$1</code>');

      // Headers
      h = h.replace(/^## (.+)$/gm, '<h3>$1</h3>');

      // Bold
      h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');

      // Bullet
      h = h.replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>');

      // Line breaks
      h = h.replace(/\n/g, '<br>');

      return h;
    },

    dlLogs() {
      const n = this.selCt?.name || 'container';
      const b = new Blob([this.logs], { type: 'text/plain' });
      const u = URL.createObjectURL(b);
      const a = document.createElement('a');

    /* ══════════════════════════════════════════════════════════════════════
       TERMINAL
       ══════════════════════════════════════════════════════════════════════ */
    openTerminal() {
      if (!this.selCt || !this.selSrvId) return;
      this.closeTerminal();

      const el = document.getElementById('terminal-container');
      if (!el) return;

      const term = new Terminal({
        theme: { background: '#000000', foreground: '#e5e7eb', cursor: '#60a5fa' },
        fontSize: 13,
        fontFamily: "'Courier New', Courier, monospace",
        cursorBlink: true,
        scrollback: 5000,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(el);
      fitAddon.fit();

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const { cols, rows } = term;
      const url = `${proto}//${location.host}/ws/terminal`
        + `?agent_id=${encodeURIComponent(this.selSrvId)}`
        + `&container=${encodeURIComponent(this.selCt.name)}`
        + `&cols=${cols}&rows=${rows}`;

      const ws = new WebSocket(url);

      ws.onopen = () => {
        this.termReady = true;
        term.write('\x1b[32mPołączono.\x1b[0m\r\n');
      };
      ws.onclose = () => {
        if (this._termWs === ws) this.termReady = false;
        try { term.write('\r\n\x1b[31m[Sesja zakończona]\x1b[0m\r\n'); } catch {}
      };
      ws.onerror = () => {
        try { term.write('\r\n\x1b[31m[Błąd WebSocket]\x1b[0m\r\n'); } catch {}
      };
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            const bytes = Uint8Array.from(atob(msg.data), c => c.charCodeAt(0));
            term.write(bytes);
          } else if (msg.type === 'ended') {
            this.termReady = false;
            term.write('\r\n\x1b[33m[Proces zakończony]\x1b[0m\r\n');
          }
        } catch {}
      };

      term.onData(data => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'input', data: btoa(data) }));
        }
      });

      term.onResize(({ cols, rows }) => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });

      const onResize = () => fitAddon.fit();
      window.addEventListener('resize', onResize);
      term._dmResizeHandler = onResize;

      this._term   = term;
      this._termFit = fitAddon;
      this._termWs  = ws;
    },

    closeTerminal() {
      if (this._termWs) { try { this._termWs.close(); } catch {} }
      if (this._term)   {
        if (this._term._dmResizeHandler) window.removeEventListener('resize', this._term._dmResizeHandler);
        try { this._term.dispose(); } catch {}
      }
      this._term    = null;
      this._termFit = null;
      this._termWs  = null;
      this.termReady = false;
    },

    /* ══════════════════════════════════════════════════════════════════════
       COMPARISON CHARTS
       ══════════════════════════════════════════════════════════════════════ */
    async loadComparison() {
      const containers = (this.selSrv?.containers || []).filter(c => c.status === 'running');
      if (!containers.length) return;
      this.cmpLoading = true;
      try {
        const results = await Promise.all(
          containers.map(c =>
            this._get(`/api/metrics/${encodeURIComponent(this.selSrvId)}/${encodeURIComponent(c.name)}?hours=${this.cmpHours}`)
              .catch(() => null)
          )
        );
        this.cmpData = containers
          .map((c, i) => ({ name: c.name, pts: results[i]?.points || [] }))
          .filter(d => d.pts.length > 0);
        this.$nextTick(() => this.renderComparisonCharts());
      } catch(e) {
        this._notify(`Błąd porównania: ${e.message}`, 'error');
      } finally {
        this.cmpLoading = false;
      }
    },

    renderComparisonCharts() {
      for (const c of Object.values(this._cmpCharts)) c.destroy();
      this._cmpCharts = {};
      if (!this.cmpData.length) return;

      const COLORS = [
        '#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6',
        '#06b6d4','#ec4899','#84cc16','#f97316','#a78bfa',
      ];

      const baseOpts = {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { labels: { color: '#6b7280', boxWidth: 10, font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#374151', maxTicksLimit: 5, maxRotation: 0 }, grid: { color: '#111827' } },
          y: { ticks: { color: '#4b5563' }, grid: { color: '#111827' }, beginAtZero: true },
        },
      };

      const mkChart = (id, datasets) => {
        const el = document.getElementById(id);
        if (!el) return;
        // Use timestamps from first dataset as labels
        const labels = (this.cmpData[0]?.pts || []).map(p => p.t.substring(11, 16));
        this._cmpCharts[id] = new Chart(el, {
          type: 'line',
          data: { labels, datasets },
          options: baseOpts,
        });
      };

      mkChart('chart-cmp-cpu', this.cmpData.map((d, i) => ({
        label: d.name,
        data: d.pts.map(p => p.cpu),
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 0, borderWidth: 1.5,
      })));

      mkChart('chart-cmp-ram', this.cmpData.map((d, i) => ({
        label: d.name,
        data: d.pts.map(p => p.mem),
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 0, borderWidth: 1.5,
      })));
    },

    /* ══════════════════════════════════════════════════════════════════════
       SERVER GROUPS + COMPUTED
       ══════════════════════════════════════════════════════════════════════ */
    get groupedServers() {
      const assigned = new Set(this.serverGroups.flatMap(g => g.members || []));
      const groups = this.serverGroups.map(g => ({
        ...g,
        members: this.sortedServers.filter(s => (g.members || []).includes(s.agent_id)),
      }));
      const ungrouped = this.sortedServers.filter(s => !assigned.has(s.agent_id));
      return { groups, ungrouped };
    },

        if (d) {
          this.serverGroups = d;
          // Auto-expand all groups on first load

            for (const g of d) this.expandedGroups[g.id] = true;

    },

          base_dn:        this.ldapForm.base_dn,
          user_filter:    this.ldapForm.user_filter,
          admin_group_dn: this.ldapForm.admin_group_dn,
        });
        this.ldapForm.ok = 'Konfiguracja LDAP zapisana.';
        await this.loadLdapConfig();
      } catch(e) {
        this.ldapForm.err = e.message;
      } finally {
        this.ldapForm.saving = false;
      }
    },

    async testLdapConnection() {
      this.ldapForm.testLoading = true;
      this.ldapForm.testResult  = '';
      this.ldapForm.testOk      = false;
      try {
        const d = await this._post('/api/settings/ldap/test', {
          test_username: this.ldapForm.testUsername,
        });
        if (d) {
          this.ldapForm.testOk     = true;
          this.ldapForm.testResult = d.message;
        }
      } catch(e) {
        this.ldapForm.testOk     = false;
        this.ldapForm.testResult = e.message;
      } finally {
        this.ldapForm.testLoading = false;
      }
    },

    async loadUsers() {
      this.usersLoading = true;
      try {
        const d = await this._get('/api/users');
        if (d) this.users = d;
      } catch(e) {
        this._notify(`Błąd: ${e.message}`, 'error');
      } finally {
        this.usersLoading = false;
      }
    },

    async createUser() {
      this.newUserForm.err = '';
      try {
        const u = await this._post('/api/users', {
          username: this.newUserForm.username.trim(),
          password: this.newUserForm.password,
          role: this.newUserForm.role,
          source: this.newUserForm.source,
        });
        if (u) {
          this.users.push(u);
          this.newUserForm.username = '';
          this.newUserForm.password = '';
          this._notify(`Użytkownik "${u.username}" utworzony.`, 'success');
        }
      } catch(e) {
        this.newUserForm.err = e.message;
      }
    },

    async deleteUser(username) {
      if (!confirm(`Usunąć użytkownika "${username}"?`)) return;
      try {
        await this._del(`/api/users/${username}`);
        this.users = this.users.filter(u => u.username !== username);
        this._notify('Użytkownik usunięty.', 'success');
      } catch(e) {
        this._notify(`Błąd: ${e.message}`, 'error');
      }
    },

    async changePassword() {
      this.pwForm.err = '';
      this.pwForm.ok = '';
      if (this.pwForm.new1 !== this.pwForm.new2) {
        this.pwForm.err = 'Nowe hasła nie są zgodne.';
        return;
      }
      if (this.pwForm.new1.length < 6) {
        this.pwForm.err = 'Hasło musi mieć co najmniej 6 znaków.';
        return;
      }
      try {
        await this._put('/api/settings/password', {
          current_password: this.pwForm.current,
          new_password: this.pwForm.new1,
        });
        this.pwForm.ok = 'Hasło zmienione pomyślnie.';
        this.pwForm.current = '';
        this.pwForm.new1 = '';
        this.pwForm.new2 = '';
      } catch(e) {
        this.pwForm.err = e.message;
      }
    },

    async loadUserGroups() {
      try {
        const d = await this._get('/api/user-groups');
        if (d) this.userGroups = d;
      } catch {}
    },

    async createUsrGroup() {
      this.newUsrGroupForm.err = '';
      try {
        const g = await this._post('/api/user-groups', {
          name: this.newUsrGroupForm.name.trim(),
        });
        if (g) {
          this.userGroups.push(g);
          this.newUsrGroupForm.name = '';
          this._notify(`Grupa "${g.name}" utworzona.`, 'success');
        }
      } catch(e) {
        this.newUsrGroupForm.err = e.message;
      }
    },

    async deleteUsrGroup(id) {
      if (!confirm('Usunąć grupę?')) return;
      try {
        await this._del(`/api/user-groups/${id}`);
        this.userGroups = this.userGroups.filter(g => g.id !== id);
        this._notify('Grupa usunięta.', 'success');
      } catch(e) {
        this._notify(`Błąd: ${e.message}`, 'error');
      }
    },

    async toggleUsrGroupMember(grp, username) {
      const current = grp.members || [];
      const newMembers = current.includes(username)
        ? current.filter(u => u !== username)
        : [...current, username];
      try {
        const updated = await this._put(`/api/user-groups/${grp.id}/members`, { members: newMembers });
        if (updated) {
          const i = this.userGroups.findIndex(g => g.id === grp.id);
          if (i >= 0) this.userGroups[i] = updated;
        }
      } catch(e) {
        this._notify(`Błąd: ${e.message}`, 'error');
      }
    },

    async addUsrGroupMemberFromInput(grp) {
      const inputEl = document.getElementById(`ugrp-input-${grp.id}`);
      if (!inputEl) return;
      const username = inputEl.value.trim();
      if (!username) return;
      if (grp.members.includes(username)) {
        this._notify(`"${username}" już jest w grupie.`, 'error');
        return;
      }
      const newMembers = [...(grp.members || []), username];
      try {
        const updated = await this._put(`/api/user-groups/${grp.id}/members`, { members: newMembers });
        if (updated) {
          const i = this.userGroups.findIndex(g => g.id === grp.id);
          if (i >= 0) this.userGroups[i] = updated;
          inputEl.value = '';
        }
      } catch(e) {
        this._notify(`Błąd: ${e.message}`, 'error');
      }
    },

    async removeUsrGroupMember(grp, username) {
      const newMembers = (grp.members || []).filter(u => u !== username);
      try {
        const updated = await this._put(`/api/user-groups/${grp.id}/members`, { members: newMembers });
        if (updated) {
          const i = this.userGroups.findIndex(g => g.id === grp.id);
          if (i >= 0) this.userGroups[i] = updated;
        }
      } catch(e) {
        this._notify(`Błąd: ${e.message}`, 'error');
      }
    },

    async toggleUsrGroupServerGroup(grp, serverGroupId) {
      const current = grp.server_group_ids || [];
      const newIds = current.includes(serverGroupId)
        ? current.filter(id => id !== serverGroupId)
        : [...current, serverGroupId];
      try {
        const updated = await this._put(`/api/user-groups/${grp.id}/server-groups`, { server_group_ids: newIds });
        if (updated) {
          const i = this.userGroups.findIndex(g => g.id === grp.id);
          if (i >= 0) this.userGroups[i] = updated;
        }
      } catch(e) {
        this._notify(`Błąd: ${e.message}`, 'error');
      }
    },

    /* ══════════════════════════════════════════════════════════════════════
       BULK ACTIONS
       ══════════════════════════════════════════════════════════════════════ */
    toggleBulk(agentId, containerName) {
      const key = `${agentId}/${containerName}`;
      if (this.bulkSelected[key]) {
        delete this.bulkSelected[key];
      } else {
        this.bulkSelected[key] = { agentId, containerName };
      }
      this.bulkSelected = { ...this.bulkSelected }; // trigger reactivity
    },

    async bulkAction(action) {
      const entries = Object.values(this.bulkSelected);
      if (!entries.length) return;
      const labels = { start: 'uruchomione', stop: 'zatrzymane', restart: 'zrestartowane' };
      if (!confirm(`${entries.length} kontener(ów) zostanie ${labels[action] || action}. Kontynuować?`)) return;
      this.bulkLoading = true;
      let ok = 0, fail = 0;
      await Promise.all(entries.map(async ({ agentId, containerName }) => {
        try {
          await this._post(
            `/api/servers/${agentId}/containers/${encodeURIComponent(containerName)}/action`,
            { action }
          );
          ok++;
        } catch { fail++; }
      }));
      this.bulkLoading = false;
      this.bulkSelected = {};
      this._notify(
        `Bulk ${action}: ${ok} sukces, ${fail} błędów.`,
        fail ? 'error' : 'success'
      );
    },

  }; // end return
} // end app()
</script>

</body>
</html>
