services:
  dockermind-agent:
    build: .
    image: dockermind-agent:1.0
    container_name: dockermind-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/dockermind:/etc/dockermind:ro
      - /:/host:ro
    environment:
      - CENTRAL_URL=ws://${CENTRAL_HOST}/ws/agent
      - AGENT_TOKEN=${AGENT_TOKEN}
      - AGENT_NAME=${AGENT_NAME}
      - HOST_ROOT=/host
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    read_only: true
    tmpfs:
      - /tmp
